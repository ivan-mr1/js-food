<div data-slider class="slider">
  <div data-slider-counter class="slider__counter" aria-live="polite">
    <button
      data-slider-btn-prev
      class="slider__prev"
      title="Previous slide"
      aria-label="Previous slide"
    >
      <svg
        width="38"
        height="5"
        viewBox="0 0 38 5"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <line
          x1="37.3206"
          y1="3.25"
          x2="7.32056"
          y2="3.25"
          stroke="currentColor"
          stroke-width="2"
        />
        <path
          d="M17.3205 -3.02842e-06L17.3205 4.25L7.43094e-07 4.25L8.32056 1.75L17.3205 -3.02842e-06Z"
          fill="currentColor"
        />
      </svg>
    </button>

    <span data-slider-counter-current class="slider__current"></span>
    /
    <span data-slider-counter-total class="slider__total"></span>

    <button
      data-slider-btn-next
      class="slider__next"
      title="next slide"
      aria-label="next slide"
    >
      <svg
        width="38"
        height="5"
        viewBox="0 0 38 5"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <line y1="1" x2="30" y2="1" stroke="currentColor" stroke-width="2" />
        <path
          d="M20 4.25L20 1.51421e-06L37.3206 0L29 2.5L20 4.25Z"
          fill="currentColor"
        />
      </svg>
    </button>
  </div>
  <div data-slider-wrapper class="slider__wrapper">
    <ul data-slider-track class="slider__track">
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/pepper.webp"
          alt="pepper"
          width="650"
          height="390"
          loading="eager"
          fetchpriority="high"
        />
      </li>
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/food-12.webp"
          alt="food"
          width="650"
          height="390"
          loading="lazy"
        />
      </li>
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/olive-oil.webp"
          alt="oil"
          width="650"
          height="390"
          loading="lazy"
        />
      </li>
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/paprika.webp"
          alt="paprika"
          width="650"
          height="390"
          loading="lazy"
        />
      </li>
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/slider1.webp"
          alt="paprika1"
          width="650"
          height="390"
          loading="lazy"
        />
      </li>
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/slider2.webp"
          alt="paprika2"
          width="650"
          height="390"
          loading="lazy"
        />
      </li>
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/slider3.webp"
          alt="paprika3"
          width="650"
          height="390"
          loading="lazy"
        />
      </li>
      <li data-slider-slide class="slider__slide">
        <img
          src="shared/assets/img/slider/slider4.webp"
          alt="paprika4"
          width="650"
          height="390"
          loading="lazy"
        />
      </li>
    </ul>
  </div>
  <div data-slider-pagination class="slider__pagination"></div>
</div>
