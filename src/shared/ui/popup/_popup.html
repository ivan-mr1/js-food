<div data-popup="feedback" aria-hidden="true" class="popup">
  <div data-popup-wrapper class="popup__wrapper">
    <div data-popup-body class="popup__body">
      <button
        data-popup-close
        type="button"
        class="popup__close"
        aria-label="Close popup"
        title="Close popup"
      >
        <svg
          width="40"
          height="40"
          viewBox="0 0 40 40"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M30 10L10 30"
            stroke="#ffa501"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M10 10L30 30"
            stroke="#ffa501"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <div data-popup-content class="popup__content">
        <form class="popup__form">
          <div class="field popup__field">
            <label class="field__label" for="name">Ваше имя</label>
            <input
              class="field__input"
              id="name"
              placeholder=" "
              autocomplete="off"
              required
            />
          </div>
          <div class="field popup__field">
            <label class="field__label" for="phone">Ваш номер телефона</label>
            <input
              class="field__input"
              id="phone"
              placeholder=" "
              autocomplete="off"
              required
            />
          </div>
          <button class="button button--orange popup__button">
            Перезвонить мне
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
