<div data-timer class="timer">
  <div class="timer__block">
    <div class="timer__value" data-timer-unit="days">00</div>
    <span class="timer__label" data-timer-label="days">дней</span>
  </div>
  
  <div class="timer__block">
    <div class="timer__value" data-timer-unit="hours">00</div>
    <span class="timer__label" data-timer-label="hours">часов</span>
  </div>

  <div class="timer__block">
    <div class="timer__value" data-timer-unit="minutes">00</div>
    <span class="timer__label" data-timer-label="minutes">минут</span>
  </div>

  <div class="timer__block">
    <div class="timer__value" data-timer-unit="seconds">00</div>
    <span class="timer__label" data-timer-label="seconds">секунды</span>
  </div>
</div>
