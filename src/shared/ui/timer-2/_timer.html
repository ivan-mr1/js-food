<div data-timer class="timer">
  <div class="timer__block">
    <div class="timer__value" data-timer-unit="days">0</div>
    <span class="timer__label">дней</span>
  </div>
  
  <div class="timer__block">
    <div class="timer__value" data-timer-unit="hours">00</div>
    <span class="timer__label">часов</span>
  </div>

  <div class="timer__block">
    <div class="timer__value" data-timer-unit="minutes">0</div>
    <span class="timer__label">минут</span>
  </div>

  <div class="timer__block">
    <div class="timer__value" data-timer-unit="seconds">00</div>
    <span class="timer__label">секунды</span>
  </div>
</div>
