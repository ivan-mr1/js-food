<div class="order">
  <div class="order__container">
    <div class="title order__title">Заказывай пробный день прямо сейчас!</div>
    <form action="#" class="order__form">
      <input
        required
        placeholder="Ваше имя"
        name="name"
        type="text"
        class="order__input"
      />
      <input
        required
        placeholder="Ваш номер телефона"
        name="phone"
        type="phone"
        class="order__input"
      />
      <img src="shared/assets/icons/right.svg" alt="right" />
      <button class="button">Перезвонить мне</button>
    </form>
  </div>
</div>
