<section class="order">
  <div class="order__container">
    <h2 class="title order__title">Заказывай пробный день прямо сейчас!</h2>
    <form action="#" class="order__form">
      <div class="field order__field">
        <label class="field__label" for="name">Ваше имя</label>
        <input
          class="field__input"
          id="name"
          placeholder=" "
          autocomplete="off"
          required
        />
      </div>
      <div class="field order__field">
        <label class="field__label" for="phone">Ваш номер телефона</label>
        <input
          class="field__input"
          id="phone"
          placeholder=" "
          autocomplete="off"
          required
        />
      </div>
      <img
        src="shared/assets/img/icons/right.svg"
        alt="right"
        width="57"
        height="8"
        loading="lazy"
      />
      <button class="button button--orange order__button">
        Перезвонить мне
      </button>
    </form>
  </div>
</section>
