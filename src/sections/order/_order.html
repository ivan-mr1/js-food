<section class="order">
  <div class="order__container">
    <h2 class="title order__title">Заказывай пробный день прямо сейчас!</h2>
    <form action="#" class="order__form">
      <input
        required
        placeholder="Ваше имя"
        name="name"
        type="text"
        class="order__input"
      />
      <input
        required
        placeholder="Ваш номер телефона"
        name="phone"
        type="phone"
        class="order__input"
      />
      <img src="shared/assets/icons/right.svg" alt="right" width="57" height="8" loading="lazy" />
      <button class="button order__button">Перезвонить мне</button>
    </form>
  </div>
</section>
