<section class="calculating" aria-labelledby="calculating__title">
  <div class="calculating__container">
    <h2 class="title calculating__title" id="calculating__title">
      Рассчитаем вашу потребность в калориях?
    </h2>
    <div data-calc class="calculating__wrapper">
      <h3 class="calculating__subtitle">Ваш пол</h3>
      <div data-calc-gender class="calculating__choose" id="gender">
        <button
          data-calc="female"
          class="calculating__choose-item is-active"
        >
          Женщина
        </button>
        <button data-calc="male" class="calculating__choose-item">
          Мужчина
        </button>
      </div>
      <h3 class="calculating__subtitle">Ваша конституция</h3>
      <div class="calculating__choose calculating__choose--medium">
        <div class="field calculating__choose-item">
          <label class="field__label" for="height">Введите рост</label>
          <input
            class="field__input"
            id="height"
            placeholder=" "
            autocomplete="off"
            required
            data-calc-height
          />
        </div>
        <div class="field calculating__choose-item">
          <label class="field__label" for="weight">Введите вес</label>
          <input
            class="field__input"
            id="weight"
            placeholder=" "
            autocomplete="off"
            required
            data-calc-weight
          />
        </div>
        <div class="field calculating__choose-item">
          <label class="field__label" for="age">Введите возраст</label>
          <input
            class="field__input"
            id="age"
            placeholder=" "
            autocomplete="off"
            required
            data-calc-age
          />
        </div>
      </div>
      <h3 class="calculating__subtitle">Выберите вашу физическая активность</h3>
      <div
        data-calc-activity
        class="calculating__choose calculating__choose--big"
      >
        <button id="low" data-ratio="1.2" class="calculating__choose-item">
          Низкая активность
        </button>
        <button
          data-ratio="1.375"
          id="small"
          class="calculating__choose-item is-active"
        >
          Невысокая активность
        </button>
        <button
          data-ratio="1.55"
          id="medium"
          class="calculating__choose-item"
        >
          Умеренная активность
        </button>
        <button
          data-ratio="1.725"
          id="high"
          class="calculating__choose-item"
        >
          Высокая активность
        </button>
      </div>
      <div class="calculating__divider"></div>
      <div class="calculating__total">
        <div class="calculating__subtitle">Ваша суточная норма калорий:</div>
        <div class="calculating__result">
          <span data-calc-result>2700</span> ккал
        </div>
      </div>
    </div>
  </div>
</section>
