<section class="promotion" aria-labelledby="promotion-title">
  <div class="bgc-yellow"></div>
  <div class="promotion__container">
    <div class="promotion__content">
      <h3 id="promotion-title" class="title promotion__title">
        Акция для новых клиентов!
      </h3>
      <div class="promotion__descr">
        Мы ценим каждого клиента и предлагаем вам стать одним из них на очень
        выгодных условиях. Каждому, кто закажет доставку питание на неделю,
        будет предоставлена скидка в размере <span class="percent">20%!</span>
        <br /><br />
        Акция закончится: 
        <span data-deadline class="promotion__end-date">время вышло</span>
      </div>
    </div>
    <div class="promotion__timer">
      <div class="title">Осталось до конца акции:</div>
      <load src="shared/ui/timer/_timer.html" />
    </div>
  </div>
</section>
